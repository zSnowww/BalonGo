<ion-content class="productos-content">
  <div class="productos-wrapper">
    <div class="page-header">
      <h1>Productos</h1>
      <div class="header-count">{{ productos.length }}</div>
    </div>

    <div class="search-bar">
      <span class="search-ico">🔍</span>
      <ion-input placeholder="Buscar producto..." type="text" [(ngModel)]="busqueda"></ion-input>
    </div>

    <div class="productos-grid">
      <div *ngIf="productosFiltrados().length === 0" class="empty-state">
        <div class="empty-icon">📦</div>
        <p>No hay productos</p>
      </div>

      <div class="producto-card" *ngFor="let producto of productosFiltrados(); let i = index">
        <div class="prod-top">
          <div class="prod-icon">{{ producto.icono }}</div>
          <div class="stock-badge" [ngClass]="producto.stock > 10 ? 'ok' : 'low'">
            {{ producto.stock > 10 ? '✓ Stock OK' : '⚠ Stock bajo' }}
          </div>
        </div>
        <h3 class="prod-name">{{ producto.nombre }}</h3>
        <div class="prod-meta">
          <span class="prod-price">S/ {{ producto.precio }}</span>
          <span class="prod-stock">{{ producto.stock }} unidades</span>
        </div>
        <div class="prod-actions">
          <button class="action-btn edit" (click)="editarProducto(i)">✏️ Editar</button>
          <button class="action-btn del" (click)="eliminarProducto(i)">🗑️</button>
        </div>
      </div>
    </div>
  </div>

  <div class="fab-btn" (click)="toggleFormulario()">+</div>

  <div class="modal-overlay" *ngIf="mostrarFormulario" (click)="cerrarSiOverlay($event)">
    <div class="bottom-sheet">
      <div class="sheet-handle"></div>
      <h2>{{ editando ? 'Editar Producto' : 'Nuevo Producto' }}</h2>

      <div class="form-grid">
        <div class="field-section">
          <label class="section-label">Nombre</label>
          <input class="field-input" type="text" placeholder="Ej: Balón de Gas 10kg" [(ngModel)]="nuevoNombre" />
        </div>
        <div class="field-section">
          <label class="section-label">Tipo</label>
          <input class="field-input" type="text" placeholder="10kg, 15kg..." [(ngModel)]="nuevoTipo" />
        </div>
        <div class="field-section">
          <label class="section-label">Precio (S/)</label>
          <input class="field-input" type="number" placeholder="35" [(ngModel)]="nuevoPrecio" />
        </div>
        <div class="field-section">
          <label class="section-label">Stock</label>
          <input class="field-input" type="number" placeholder="20" [(ngModel)]="nuevoStock" />
        </div>
        <div class="field-section">
          <label class="section-label">Ícono (emoji)</label>
          <input class="field-input" type="text" placeholder="📦" [(ngModel)]="nuevoIcono" />
        </div>
      </div>

      <div class="btn-row">
        <button class="btn-secondary" (click)="toggleFormulario()">Cancelar</button>
        <button class="btn-primary" (click)="guardarProducto()">
          {{ editando ? 'Guardar' : 'Agregar' }}
        </button>
      </div>
    </div>
  </div>

  <app-nav-bar></app-nav-bar>
</ion-content>
