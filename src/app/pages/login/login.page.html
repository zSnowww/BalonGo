<ion-content class="login-content">
  <div class="login-bg"></div>
  <div class="login-wrapper">

    <!-- Logo -->
    <div class="logo-section">
      <div class="logo-circle">
        <img src="assets/img/Gastonsillo.png" alt="BalónGo" class="logo-img" />
      </div>
      <h1>BalónGo</h1>
      <p>Distribuidora Rogas S.R.L.</p>
    </div>

    <!-- Selector de modo -->
    <div class="mode-toggle">
      <button
        class="mode-btn"
        [class.active]="modo === 'admin'"
        (click)="modo = 'admin'">
        Administrador
      </button>
      <button
        class="mode-btn"
        [class.active]="modo === 'repartidor'"
        (click)="modo = 'repartidor'">
        Repartidor
      </button>
    </div>

    <!-- Card de login -->
    <div class="login-card">
      <div class="input-field">
        <span class="input-icon">✉</span>
        <input
          type="email"
          placeholder="Correo electrónico"
          [(ngModel)]="email"
          (keyup.enter)="ingresar()"
          class="native-input" />
      </div>

      <div class="input-field">
        <span class="input-icon">🔒</span>
        <input
          [type]="mostrarPassword ? 'text' : 'password'"
          placeholder="Contraseña"
          [(ngModel)]="password"
          (keyup.enter)="ingresar()"
          class="native-input" />
        <button class="eye-btn" (click)="togglePassword()">
          {{ mostrarPassword ? '👁' : '🙈' }}
        </button>
      </div>

      <button class="login-btn" (click)="ingresar()" [disabled]="cargando">
        <span *ngIf="!cargando">Ingresar</span>
        <span *ngIf="cargando" class="spinner">⟳</span>
      </button>

      <p class="error-msg" *ngIf="errorMsg">{{ errorMsg }}</p>
    </div>

    <p class="version-text">v1.0 · BalónGo</p>
  </div>
</ion-content>
