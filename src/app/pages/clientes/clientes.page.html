<ion-content class="clientes-content">
  <div class="clientes-wrapper">

    <div class="page-header">
      <h1>Clientes</h1>
      <div class="header-count">{{ clientes.length }}</div>
    </div>

    <div class="search-bar">
      <span class="search-ico">🔍</span>
      <ion-input
        placeholder="Buscar cliente..."
        type="text"
        [(ngModel)]="busqueda"
        (ionInput)="aplicarBusqueda()">
      </ion-input>
    </div>

    <div class="clientes-list">
      <div *ngIf="clientesFiltrados.length === 0" class="empty-state">
        <div class="empty-icon">👥</div>
        <p>No hay clientes</p>
      </div>

      <div class="cliente-card" *ngFor="let cliente of clientesFiltrados">
        <div class="avatar">{{ cliente.iniciales }}</div>
        <div class="cliente-info">
          <h3>{{ cliente.nombre }}</h3>
          <p>📞 {{ cliente.telefono }}</p>
          <p>📍 {{ cliente.direccion }}</p>
        </div>
        <div class="card-actions">
          <button class="action-btn edit" (click)="editarCliente(cliente)">✏️</button>
          <button class="action-btn del" (click)="confirmarEliminar(cliente)">🗑️</button>
        </div>
      </div>
    </div>
  </div>

  <div class="fab-btn" (click)="toggleFormulario()">+</div>

  <div class="modal-overlay" *ngIf="mostrarFormulario" (click)="cerrarSiOverlay($event)">
    <div class="bottom-sheet">
      <div class="sheet-handle"></div>
      <h2>{{ editando ? 'Editar Cliente' : 'Nuevo Cliente' }}</h2>

      <div class="field-section">
        <label class="section-label">Nombre completo</label>
        <input class="field-input" type="text" placeholder="Ej: Juan Pérez" [(ngModel)]="nuevoNombre" />
      </div>
      <div class="field-section">
        <label class="section-label">Teléfono</label>
        <input class="field-input" type="tel" placeholder="Ej: 987654321" [(ngModel)]="nuevoTelefono" />
      </div>
      <div class="field-section">
        <label class="section-label">Dirección de entrega</label>
        <input class="field-input" type="text" placeholder="Ej: Jr. Las Flores 123" [(ngModel)]="nuevaDireccion" />
      </div>

      <div class="btn-row">
        <button class="btn-secondary" (click)="toggleFormulario()">Cancelar</button>
        <button class="btn-primary" (click)="guardarCliente()">
          {{ editando ? 'Guardar' : 'Agregar' }}
        </button>
      </div>
    </div>
  </div>

  <app-nav-bar></app-nav-bar>
</ion-content>
